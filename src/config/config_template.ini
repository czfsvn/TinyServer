[main]
async_thread_count = 2

# asio context 线程数量
asio_pool_size=2
# asio 定时器回调时间间隔
asio_timer_interval_ms=200
# 程序主循环每个tick的时间间隔
main_loop_interval_ms=1000

# 网络配置
[network]
# 服务器端口
port = 8080
# 服务器主机
host = 127.0.0.1
# 模式：server 或 client
mode = server

# 日志配置
[logger]
# 日志目录
log_dir = logs
# 应用名称
app_name = network_app
# 日志文件名
log_file = app.log
# 滚动策略：HOURLY 或 DAILY
rotation_policy = DAILY
# 保留天数（按日滚动时使用）
retention_days = 30
# 保留小时数（按小时滚动时使用）
retention_hours = 72
# 单个文件最大大小（默认100MB）
max_file_size = 104857600
# 是否启用控制台日志
enable_console = true
# 是否启用异步模式
async_mode = false
# 异步队列大小
async_queue_size = 8192
# 控制台日志级别：TRACE, LOG_DEBUG, LOG_INFO, WARN, ERROR, CRITICAL, OFF
console_level = LOG_DEBUG
# 文件日志级别：TRACE, LOG_DEBUG, LOG_INFO, WARN, ERROR, CRITICAL, OFF
file_level = LOG_INFO
# 日志格式
pattern = [%Y-%m-%d %H:%M:%S.%e] [%^%t%$] [%^%l%$] %v


# 加密配置
[encryption]
# 加密密钥（AES-128，长度为16字节）
key = MySecretKey1234567890123456
# 加密向量（AES-128，长度为16字节）
iv = MySecretIV1234567890123456
